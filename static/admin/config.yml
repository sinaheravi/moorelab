backend:
  name: git-gateway
  branch: main

media_folder: "assets/media"
public_folder: "/media"

collections:
  - name: "authors"
    label: "Team Members"
    folder: "content/authors"
    create: true
    identifier_field: "title"
    fields:
      - { label: "Full Name", name: "title", widget: "string" }
      - { label: "Role / Position", name: "role", widget: "string", required: false }
      - { label: "Photo", name: "avatar", widget: "image", required: false }
      - label: "Group"
        name: "user_groups"
        widget: "select"
        multiple: true
        required: false
        options: ["Principal Investigator", "Staff", "Trainees", "Graduate Students", "Alumni"]
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Bio", name: "body", widget: "markdown", required: false }

  - name: "posts"
    label: "News"
    folder: "content/post"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Photo", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "publications"
    label: "Publications"
    folder: "content/publication"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Authors", name: "authors", widget: "list", required: false }
      - { label: "Journal", name: "publication", widget: "string", required: false }
      - { label: "Abstract", name: "abstract", widget: "text", required: false }
      - { label: "URL", name: "url_pdf", widget: "string", required: false }