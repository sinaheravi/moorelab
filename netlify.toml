[build]
  command = "hugo --gc --minify && cp static/admin/config.yml public/admin/config.yml"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.163.3"
  HUGO_EXTENDED = "true"
  GO_VERSION = "1.23.0"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture && cp static/admin/config.yml public/admin/config.yml"

[context.branch-deploy]
  command = "hugo --gc --minify && cp static/admin/config.yml public/admin/config.yml"

[[plugins]]
  package = "netlify-plugin-hugo-cache-resources"
  [plugins.inputs]
    debug = true
